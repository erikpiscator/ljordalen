name: Deploy to App Engine

# Deploys to Google App Engine when you publish a GitHub Release.
# Auth is keyless via Workload Identity Federation. Runtime secrets live in
# GCP Secret Manager (NOT GitHub) — the workflow reads them at deploy time and
# writes the gitignored env.yaml that app.yaml `includes`. So GitHub needs no
# secrets at all, mirroring the chollo setup.

on:
  release:
    types: [published]
  workflow_dispatch: # also allow manual runs from the Actions tab

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ljordalen-booking
          workload_identity_provider: projects/241239742436/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@ljordalen-booking.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # Build the gitignored env.yaml. Secrets come from Secret Manager;
      # non-secret config is inline (none of it is sensitive).
      - name: Write env.yaml
        run: |
          AUTH_SECRET="$(gcloud secrets versions access latest --secret=auth-secret --project=ljordalen-booking)"
          AUTH_GOOGLE_SECRET="$(gcloud secrets versions access latest --secret=auth-google-secret --project=ljordalen-booking)"
          # Mask in logs in case they ever surface
          echo "::add-mask::$AUTH_SECRET"
          echo "::add-mask::$AUTH_GOOGLE_SECRET"
          # Optional Resend key (create the secret to enable email)
          RESEND_API_KEY="$(gcloud secrets versions access latest --secret=resend-api-key --project=ljordalen-booking 2>/dev/null || true)"
          [ -n "$RESEND_API_KEY" ] && echo "::add-mask::$RESEND_API_KEY"
          cat > env.yaml <<YAML
          env_variables:
            NODE_ENV: "production"
            AUTH_SECRET: "$AUTH_SECRET"
            AUTH_GOOGLE_ID: "241239742436-pccb37dmk4njpufrraspqmdr33dv7tg3.apps.googleusercontent.com"
            AUTH_GOOGLE_SECRET: "$AUTH_GOOGLE_SECRET"
            AUTH_URL: "https://hoelskogen52.se"
            STORAGE_BUCKET: "ljordalen-booking-avatars"
            ADMIN_EMAILS: "erik.piscator@protonmail.com,erik.piscator@gmail.com"
            ALLOWED_EMAILS: "hakan.piscator@hotmail.com"
            RESEND_API_KEY: "$RESEND_API_KEY"
            RESEND_FROM: "Hoelskogen 52 <noreply@hoelskogen52.se>"
          YAML

      - name: Deploy
        run: gcloud app deploy app.yaml --quiet --project=ljordalen-booking

# Copy to env.yaml (gitignored) and fill in for `gcloud app deploy` from your
# machine. In CI these come from GitHub Actions secrets (see deploy.yml).
env_variables:
  NODE_ENV: "production"

  # NextAuth — generate AUTH_SECRET with: openssl rand -base64 32
  AUTH_SECRET: ""
  AUTH_GOOGLE_ID: ""
  AUTH_GOOGLE_SECRET: ""
  # Public URL of the deployed app (App Engine gives you this after first deploy)
  AUTH_URL: "https://ljordalen-booking.REGION.r.appspot.com"

  # Cloud Storage bucket for uploaded avatars (public-read)
  STORAGE_BUCKET: "ljordalen-booking-avatars"

  # Comma-separated bootstrap admin emails
  ADMIN_EMAILS: "erik.piscator@protonmail.com,erik.piscator@gmail.com"

  # Email notifications (Resend) — optional; leave empty to disable
  RESEND_API_KEY: ""
  RESEND_FROM: "Ljørdalen <noreply@ditt-domän.se>"
